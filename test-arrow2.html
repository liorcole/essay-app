<!DOCTYPE html>
<html>
<head>
<style>
html, body { overflow-x: clip; margin: 0; }
body { background: #0a0a0f; color: #e8e8e8; font-family: Georgia, serif; padding: 80px 40px; font-size: 1.25rem; min-height: 300vh; }
.box { display: inline-block; background: #86efac; color: #000; padding: 10px 20px; border-radius: 8px; }
#box2 { margin-top: 200px; margin-left: 300px; }
</style>
</head>
<body>

<p>Click "FROM" to draw a line to "TO".</p>
<div class="box" id="box1">FROM</div>
<br>
<div class="box" id="box2">TO</div>

<script>
document.getElementById('box1').addEventListener('click', function() {
    var r1 = document.getElementById('box1').getBoundingClientRect();
    var r2 = document.getElementById('box2').getBoundingClientRect();
    var sx = window.pageXOffset;
    var sy = window.pageYOffset;

    var x1 = r1.left + r1.width/2 + sx;
    var y1 = r1.bottom + sy;
    var x2 = r2.left + r2.width/2 + sx;
    var y2 = r2.top + sy;

    var dx = x2 - x1, dy = y2 - y1;
    var len = Math.sqrt(dx*dx + dy*dy);
    var angle = Math.atan2(dy, dx) * 180 / Math.PI;

    var line = document.createElement('div');
    line.style.cssText = 'position:absolute;height:3px;background:#86efac;transform-origin:0 50%;pointer-events:none;z-index:1000;border-radius:2px;';
    line.style.left = x1 + 'px';
    line.style.top = y1 + 'px';
    line.style.width = len + 'px';
    line.style.transform = 'rotate(' + angle + 'deg)';
    document.body.appendChild(line);

    var dot = document.createElement('div');
    dot.style.cssText = 'position:absolute;width:8px;height:8px;background:#86efac;border-radius:50%;pointer-events:none;z-index:1001;';
    dot.style.left = (x2 - 4) + 'px';
    dot.style.top = (y2 - 4) + 'px';
    document.body.appendChild(dot);

    document.title = 'r1.top=' + r1.top.toFixed(0) + ' r2.top=' + r2.top.toFixed(0) + ' sy=' + sy;
});
</script>
</body>
</html>
