<!DOCTYPE html>
<html>
<head>
<style>
html, body { overflow-x: clip; }
body { background: #0a0a0f; color: #e8e8e8; font-family: Georgia, serif; padding: 80px 40px; font-size: 1.25rem; min-height: 200vh; }
#target { display: inline-block; background: #86efac; color: #000; padding: 10px 20px; border-radius: 8px; margin-top: 400px; }
#result { position: fixed; bottom: 20px; left: 20px; background: #333; padding: 10px; font-size: 14px; z-index: 9999; }
</style>
</head>
<body>

<p>Scroll down and click the green box. A red dot should appear exactly on it.</p>

<div id="target">CLICK ME - dot should appear here</div>

<div id="result"></div>

<script>
var target = document.getElementById('target');
var result = document.getElementById('result');

target.addEventListener('click', function() {
    var rect = target.getBoundingClientRect();
    var sx = window.pageXOffset;
    var sy = window.pageYOffset;

    result.innerHTML =
        'rect.left=' + rect.left.toFixed(0) + ' rect.top=' + rect.top.toFixed(0) +
        '<br>pageXOffset=' + sx + ' pageYOffset=' + sy +
        '<br>clientWidth=' + document.documentElement.clientWidth +
        '<br>innerWidth=' + window.innerWidth +
        '<br>devicePixelRatio=' + window.devicePixelRatio;

    // Method 1: absolute + scroll offset
    var d1 = document.createElement('div');
    d1.style.cssText = 'position:absolute;width:16px;height:16px;background:red;border-radius:50%;z-index:9999;pointer-events:none;';
    d1.style.left = (rect.left + rect.width/2 - 8 + sx) + 'px';
    d1.style.top = (rect.top + rect.height/2 - 8 + sy) + 'px';
    document.body.appendChild(d1);

    // Method 2: fixed (no scroll)
    var d2 = document.createElement('div');
    d2.style.cssText = 'position:fixed;width:12px;height:12px;background:blue;border-radius:50%;z-index:9999;pointer-events:none;';
    d2.style.left = (rect.left + rect.width/2 - 6) + 'px';
    d2.style.top = (rect.top + rect.height/2 - 6) + 'px';
    document.body.appendChild(d2);

    // Method 3: append to documentElement instead of body
    var d3 = document.createElement('div');
    d3.style.cssText = 'position:absolute;width:10px;height:10px;background:yellow;border-radius:50%;z-index:9999;pointer-events:none;';
    d3.style.left = (rect.left + rect.width/2 - 5 + sx) + 'px';
    d3.style.top = (rect.top + rect.height/2 - 5 + sy) + 'px';
    document.documentElement.appendChild(d3);
});
</script>
</body>
</html>
