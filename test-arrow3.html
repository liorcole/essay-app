<!DOCTYPE html>
<html>
<head>
<style>
html, body { overflow-x: clip; margin: 0; }
body { background: #0a0a0f; color: #e8e8e8; font-family: Georgia, serif; font-size: 1.25rem; min-height: 100vh; line-height: 1.8; }
.essay-container { max-width: 720px; margin: 0 auto; padding: 80px 40px; }
.keyword { color: #86efac; font-weight: 700; font-size: 1.5rem; cursor: pointer; }
.target { width: 200px; height: 200px; background: rgba(134,239,172,0.2); border: 2px solid #86efac; border-radius: 8px; margin: 100px auto; display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
<div class="essay-container">
<p>Lots of text here to simulate the essay layout. Scroll down to see content below.</p>
<p>More text padding...</p>
<p>More text padding...</p>
<p>More text padding...</p>
<p>Click <span class="keyword" id="kw">limited</span> to draw arrow to the box below.</p>

<div class="target" id="target">TARGET</div>

<p>More text below...</p>
<p>More text below...</p>
<p style="margin-bottom: 2000px;">Even more below to make page long...</p>
</div>

<script>
document.getElementById('kw').addEventListener('click', function() {
    var kwRect = document.getElementById('kw').getBoundingClientRect();
    var tgRect = document.getElementById('target').getBoundingClientRect();
    var sx = window.pageXOffset || 0;
    var sy = window.pageYOffset || 0;

    var x1 = kwRect.left + kwRect.width/2 + sx;
    var y1 = kwRect.bottom + 5 + sy;
    var x2 = tgRect.left + tgRect.width/2 + sx;
    var y2 = tgRect.top - 5 + sy;

    var dx = x2 - x1, dy = y2 - y1;
    var len = Math.sqrt(dx*dx + dy*dy);
    var angle = Math.atan2(dy, dx) * 180 / Math.PI;

    var line = document.createElement('div');
    line.style.cssText = 'position:absolute;height:3px;background:#86efac;transform-origin:0 50%;pointer-events:none;z-index:1000;border-radius:2px;';
    line.style.left = x1 + 'px';
    line.style.top = y1 + 'px';
    line.style.width = len + 'px';
    line.style.transform = 'rotate(' + angle + 'deg)';
    document.body.appendChild(line);

    var dot = document.createElement('div');
    dot.style.cssText = 'position:absolute;width:8px;height:8px;background:#86efac;border-radius:50%;pointer-events:none;z-index:1001;';
    dot.style.left = (x2 - 4) + 'px';
    dot.style.top = (y2 - 4) + 'px';
    document.body.appendChild(dot);
});
</script>
</body>
</html>
